name: CI

# Minimal gate: typecheck + the full test suite on every push and PR.
# The 4 Postgres-integration tests self-skip without CSAGENT_TEST_PG_URL.
on:
  push:
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # No test launches a real browser, so skip puppeteer's Chromium download.
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - uses: actions/checkout@v4

      # Node 22: the store layer uses node:sqlite (DatabaseSync), which needs
      # Node >= 22.5 even though package.json engines says >=20.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
